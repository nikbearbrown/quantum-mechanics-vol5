name: Build EPUB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Convert SVGs to PNG
        run: node SCRIPTS/svg-to-png.mjs

      - name: Build all editions (uses repo build.sh — single source of truth)
        run: bash build.sh

      - name: Upload EPUBs and HTML as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: book-builds
          path: |
            output/*.epub
            output/*.html
