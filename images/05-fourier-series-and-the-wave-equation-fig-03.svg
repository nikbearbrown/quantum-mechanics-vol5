<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0503">
<title id="fig-title-0503">Bloch theorem: periodic potential couples momentum states separated by reciprocal lattice vectors</title>
<desc>Horizontal k-axis showing the reciprocal lattice as a comb of equally spaced ticks at integer multiples of G. Filled circles mark the plane-wave components of a Bloch state at k, k plus G, k plus 2G, k minus G, k minus 2G. Curved coupling brackets connect nearest-neighbor components, indicating that the periodic potential mixes these specific momentum pairs. Dashed vertical lines at plus and minus pi over a mark the first Brillouin zone boundary, where two degenerate components are connected by a gap-indicator bracket.</desc>
