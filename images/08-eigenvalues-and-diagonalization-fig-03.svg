  <!-- Explanatory text left side -->
  <text x="180" y="185" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#2a1a0e">Each projector Pₙ = |eₙ⟩⟨eₙ| is rank-1:</text>
  <text x="180" y="201" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#2a1a0e">it maps any vector onto one direction</text>
  <text x="180" y="220" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">The eigenvalue λₙ weights the projection:</text>
  <text x="180" y="236" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">large λ ↔ dominant contribution</text>
  <text x="180" y="255" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">A full operator = sum of its projector parts</text>

