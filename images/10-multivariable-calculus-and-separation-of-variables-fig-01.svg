  <title id="fig-title-10-01">Four-step separation-of-variables cascade (Cartesian)</title>
  <desc>Four stacked panels connected by downward arrows: Panel 1 the full 3D PDE with three coordinate inputs; Panel 2 the product ansatz substituting the wavefunction as a product of three single-variable functions; Panel 3 the division step isolating each coordinate ratio; Panel 4 three independent ODEs each terminated at a zero-at-wall boundary condition from which a quantized constant emerges.</desc>
