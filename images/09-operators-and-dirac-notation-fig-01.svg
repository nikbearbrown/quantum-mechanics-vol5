<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title-09-01">
  <title id="fig-title-09-01">Bra–ket type grammar — inner product vs. outer product</title>
  <desc>Two rows separated by a horizontal rule: top row shows a bra facing right combined with a ket facing left producing a scalar dot; bottom row shows a ket facing right combined with a bra facing left producing a 2×2 operator matrix and a mapping arrow. A sidebar indicator shows the anti-linearity conjugate star on the bra only.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Quantum Mechanics — Math for Quantum Physics"
      book-slug="quantum-mechanics-vol5"
      chapter="09-operators-and-dirac-notation"
      figure-number="01"
      figure-title="Bra–ket type grammar — inner product vs. outer product"
      figure-slug="bra-ket-type-grammar"
