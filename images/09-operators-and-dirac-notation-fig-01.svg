  </defs>

  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle"
        font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" font-weight="400"
        fill="#2a1a0e">Bra–ket type grammar: two combinations, two results</text>

  <!-- Background for diagram area -->
  <rect x="36" y="45" width="520" height="350" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Separator between rows -->
  <line x1="36" y1="220" x2="556" y2="220" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ROW LABELS -->
  <text x="52" y="78" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" font-weight="600" fill="#2a1a0e">⟨φ|ψ⟩</text>
  <text x="52" y="94" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#545454">inner product</text>
  <text x="52" y="110" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#545454">bra · ket</text>

  <text x="52" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" font-weight="600" fill="#2a1a0e">|ψ⟩⟨φ|</text>
  <text x="52" y="264" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#545454">outer product</text>
  <text x="52" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#545454">ket · bra</text>

  <!-- ═══ ROW 1: ⟨φ| · |ψ⟩ → scalar ═══ -->

  <!-- Bra ⟨φ|: left-facing half-bracket, opens to the right -->
  <!-- Drawn as a ⟨ shape at (165,130) opening rightward -->
  <path d="M200,100 L170,132 L200,164" fill="none" stroke="#C8102E" stroke-width="3"
        stroke-linejoin="round"/>
  <!-- bra label -->
  <text x="145" y="136" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13"
        fill="#C8102E">⟨φ|</text>

  <!-- Ket |ψ⟩: right-facing half-bracket, opens to the left -->
  <!-- Drawn as a ⟩ shape at (280,130) opening leftward -->
  <path d="M270,100 L300,132 L270,164" fill="none" stroke="#ADADAD" stroke-width="3"
        stroke-linejoin="round"/>
  <!-- ket label -->
  <text x="325" y="136" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13"
        fill="#ADADAD">|ψ⟩</text>

  <!-- Closure indicator: the open ends face each other — closed pair -->
  <path d="M202,116 L268,116" fill="none" stroke="#D4D4D4" stroke-width="0.75"
        stroke-dasharray="3 2"/>
  <path d="M202,148 L268,148" fill="none" stroke="#D4D4D4" stroke-width="0.75"
        stroke-dasharray="3 2"/>

  <!-- Arrow → result (scalar) -->
  <line x1="320" y1="132" x2="380" y2="132" stroke="#ADADAD" stroke-width="1.5"
        marker-end="url(#arr09a)"/>

  <!-- Scalar result: filled circle -->
  <circle cx="408" cy="132" r="14" fill="#2a1a0e" fill-opacity="0.7"/>
  <text x="408" y="137" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#FFFFFF">c ∈ ℂ</text>

  <!-- Result label -->
  <text x="440" y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#2a1a0e">= one complex</text>
  <text x="440" y="143" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#2a1a0e">number (scalar)</text>

  <!-- ═══ ROW 2: |ψ⟩⟨φ| → operator ═══ -->

  <!-- Ket |ψ⟩ facing right (opens rightward) -->
  <path d="M185,260 L215,292 L185,324" fill="none" stroke="#ADADAD" stroke-width="3"
        stroke-linejoin="round"/>
  <text x="160" y="296" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13"
        fill="#ADADAD">|ψ⟩</text>

  <!-- Bra ⟨φ| facing left (opens leftward) -->
  <path d="M280,260 L250,292 L280,324" fill="none" stroke="#C8102E" stroke-width="3"
        stroke-linejoin="round"/>
  <text x="305" y="296" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13"
        fill="#C8102E">⟨φ|</text>

  <!-- Open ends facing outward — outer product indicator -->
  <!-- Arrow showing the pair opens outward -->
  <text x="235" y="256" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">open ends face OUT</text>

  <!-- Arrow → result (operator matrix + mapping) -->
  <line x1="318" y1="292" x2="358" y2="292" stroke="#ADADAD" stroke-width="1.5"
        marker-end="url(#arr09a)"/>

  <!-- 2×2 filled operator grid icon -->
  <rect x="368" y="264" width="22" height="22" fill="#C8860E" fill-opacity="0.5" stroke="#D4D4D4" stroke-width="0.75"/>
  <rect x="390" y="264" width="22" height="22" fill="#C8860E" fill-opacity="0.5" stroke="#D4D4D4" stroke-width="0.75"/>
  <rect x="368" y="286" width="22" height="22" fill="#C8860E" fill-opacity="0.5" stroke="#D4D4D4" stroke-width="0.75"/>
  <rect x="390" y="286" width="22" height="22" fill="#C8860E" fill-opacity="0.5" stroke="#D4D4D4" stroke-width="0.75"/>
  <path d="M364,261 L360,261 L360,311 L364,311" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <path d="M416,261 L420,261 L420,311 L416,311" fill="none" stroke="#2a1a0e" stroke-width="1"/>

  <!-- Mapping arrow: operator maps |ket⟩ → |ket'⟩ -->
  <line x1="430" y1="292" x2="480" y2="292" stroke="#ADADAD" stroke-width="1.5"
        marker-end="url(#arr09a)"/>

  <!-- Output ket -->
  <path d="M485,274 L510,292 L485,310" fill="none" stroke="#ADADAD" stroke-width="2"
        stroke-linejoin="round"/>
  <text x="518" y="296" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="12" fill="#ADADAD">|ψ'⟩</text>

  <text x="390" y="332" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">rank-1 operator: maps any ket to a multiple of |ψ⟩</text>

  <!-- ═══ SIDEBAR: Anti-linearity indicator ═══ -->
  <rect x="574" y="45" width="110" height="350" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="629" y="66" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        font-weight="600" fill="#2a1a0e">Anti-linearity</text>
  <text x="629" y="80" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">of bra</text>

  <!-- Ket: α|ψ⟩ — coefficient has no star -->
  <text x="629" y="116" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11"
        fill="#ADADAD">α|ψ⟩</text>
  <text x="629" y="132" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">ket: α plain</text>

  <!-- Bra: α*⟨ψ| — coefficient gets complex conjugate -->
  <text x="629" y="168" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11"
        fill="#C8102E">α*⟨ψ|</text>
  <text x="629" y="184" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">bra: α becomes α*</text>

  <!-- Visual conjugation symbol: star -->
  <text x="629" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="18"
        fill="#C8102E">*</text>
  <text x="629" y="230" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#C8102E">conjugation</text>
  <text x="629" y="244" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#C8102E">marker on bra</text>
  <text x="629" y="262" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">only — not on ket</text>

  <!-- Caption -->
  <text x="350" y="402" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">Closing the brackets inward ⟨·|·⟩ gives a number; opening them outward |·⟩⟨·| gives an operator</text>
  <text x="350" y="416" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">The bra is the conjugate-linear dual of the ket: coefficient α → α* when passing to ⟨ψ|</text>
</svg>
