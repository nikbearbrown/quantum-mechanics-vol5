<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0303">
<title id="fig-title-0303">Matching conditions at a finite potential step</title>
<desc>Step potential V(x) with a low region on the left and a higher region on the right. A dashed energy line lies between the two potential levels. The wave function is oscillatory on the left and transitions smoothly to a decaying exponential on the right. A dot at the junction x=0 marks the point where both the value and the first derivative are continuous, producing a smooth join with no kink.</desc>
