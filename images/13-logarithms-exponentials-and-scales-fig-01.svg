  <title id="fig-title-01">Log–log vs semi-log linearization diagnostic</title>
  <desc>Two-panel comparison: a power law y=x^2.5 shown on linear axes (upward-bending curve) and on log–log axes (straight line with slope triangle), alongside an exponential y=e^(0.8x) on linear axes and on semi-log axes (straight line with slope triangle), illustrating which axis transform linearizes which functional family.</desc>
