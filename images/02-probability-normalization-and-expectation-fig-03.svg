<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0203">
<title id="fig-title-0203">Gaussian wave packet: reciprocal widths in position and momentum space</title>
<desc>A 2-by-2 grid showing two quantum states. Top row is position space, bottom row is momentum space. Left column shows a state narrow in position (small delta-x) and wide in momentum (large delta-p). Right column shows the opposite: wide in position, narrow in momentum. The width brackets confirm the reciprocal relationship delta-x times delta-p equals hbar over 2.</desc>
