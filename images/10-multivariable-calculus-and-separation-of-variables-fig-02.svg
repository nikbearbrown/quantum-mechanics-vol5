  <text x="350" y="74" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10"
        fill="#545454">[−ℏ²/2m ∇² + V(r)] Ψ = EΨ , Ψ = R(r)Θ(θ)Φ(φ)</text>

  <!-- Coordinate arrows entering source oval from left -->
  <line x1="168" y1="52" x2="203" y2="58" stroke="#ADADAD" stroke-width="1"
