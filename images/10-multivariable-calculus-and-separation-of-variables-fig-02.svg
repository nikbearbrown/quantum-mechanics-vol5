  <desc>Three-tier hierarchy: top tier one source oval representing the spherical PDE with three coordinate arrows; middle tier three equation boxes (azimuthal, polar, radial) each with a constraint marker; bottom tier three quantum number output tokens, one per chain, connected by vertical arrows.</desc>
