        fill="#2a1a0e">Spherical separation: one PDE → three quantum numbers</text>

  <!-- ── TIER 1: Source oval ── -->
  <ellipse cx="350" cy="62" rx="145" ry="26" fill="#D4D4D4" fill-opacity="0.3"
