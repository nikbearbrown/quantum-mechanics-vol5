  <text x="350" y="186" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10"
        fill="#2a1a0e">sin θ·d/dθ[sin θ·dΘ/dθ]+[ℓ(ℓ+1)sin²θ−m²]Θ=0</text>
  <text x="350" y="198" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9"
