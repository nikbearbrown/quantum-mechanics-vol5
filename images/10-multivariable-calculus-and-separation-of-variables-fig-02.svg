  <text x="552" y="316" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        font-weight="600" fill="#C8102E">principal quantum</text>
  <text x="552" y="330" text-anchor="middle"
