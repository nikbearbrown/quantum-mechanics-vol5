<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0604">
<title id="fig-title-0604">Born scattering: geometry and forward-peaked differential cross-section</title>
<desc>Left panel shows the scattering geometry: an incident wave vector k_i arriving at a potential region (shaded circle), a scattered wave vector k_f departing at the scattering angle theta, a curved arc indicating the momentum transfer q between the two vector tips, and a small arc at the center marking the scattering angle. Right panel shows the differential cross-section d-sigma over d-Omega versus scattering angle from 0 to pi radians, a smooth forward-peaked curve falling monotonically to near zero at large angles, typical of a finite-range screened potential.</desc>
