  <title id="fig-title-c17-02">Classical versus quantum crossover: dimensionless ratio hbar omega over k_B T</title>
  <desc>Horizontal logarithmic axis spanning 16 decades from 10^-12 to 10^4 showing the dimensionless ratio hbar*omega/k_B*T. The classical regime (ratio much less than 1) is shaded ochre; the quantum regime (ratio much greater than 1) is shaded ink. Three downward markers identify a 1 kHz macroscopic pendulum (ratio ~10^-10), an intermediate 1 GHz resonator (ratio ~10^-3), and a hydrogen atom at room temperature (ratio ~540). A vertical dashed threshold at ratio=1 marks the classical-quantum crossover.</desc>
