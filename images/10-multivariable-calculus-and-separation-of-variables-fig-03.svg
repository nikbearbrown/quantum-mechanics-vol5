  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle"
        font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" font-weight="400"
        fill="#2a1a0e">Sign of separation constant — which solutions survive?</text>

  <!-- Input arrow: general separated ODE → decision diamond -->
  <line x1="350" y1="35" x2="350" y2="68" stroke="#C8860E" stroke-width="1.5"
        marker-end="url(#arr10c)"/>
  <text x="358" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#C8860E">separated ODE: f'' = k·f</text>

  <!-- Decision diamond -->
  <polygon points="350,72 414,104 350,136 286,104" fill="#D4D4D4" fill-opacity="0.3"
           stroke="#ADADAD" stroke-width="1.5"/>
  <text x="350" y="100" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        font-weight="600" fill="#2a1a0e">Sign of k?</text>
  <text x="350" y="116" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10"
        fill="#545454">f'' = k·f</text>

  <!-- Left branch: k < 0 (oscillatory) -->
  <line x1="286" y1="104" x2="170" y2="152" stroke="#2a1a0e" stroke-width="1.5"
        marker-end="url(#arr10c-green)"/>
  <text x="218" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11"
        fill="#2a1a0e">k &lt; 0</text>
  <text x="218" y="148" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">k = −κ² (κ real)</text>

  <!-- Right branch: k > 0 (exponential) -->
  <line x1="414" y1="104" x2="530" y2="152" stroke="#C8102E" stroke-width="1.5"
        marker-end="url(#arr10c-red)"/>
  <text x="482" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11"
        fill="#C8102E">k &gt; 0</text>
  <text x="482" y="148" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">k = +κ² (κ real)</text>

  <!-- ── LEFT BRANCH: Negative constant → oscillatory ── -->

  <!-- Sign box -->
  <rect x="70" y="155" width="200" height="36" fill="#2a1a0e" fill-opacity="0.07"
        stroke="#2a1a0e" stroke-width="1"/>
  <text x="170" y="170" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        font-weight="600" fill="#2a1a0e">Negative constant: k = −κ²</text>
  <text x="170" y="184" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10"
        fill="#2a1a0e">f(x) = A sin(κx) + B cos(κx)</text>

  <!-- Down arrow to sinusoidal curve -->
  <line x1="170" y1="192" x2="170" y2="222" stroke="#ADADAD" stroke-width="1"
