  <!-- No zero crossing ticks (none expected) -->
  <!-- "No zero crossings" annotation -->
  <text x="539" y="300" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9"
        fill="#C8102E">no zero crossings</text>

  <!-- Arrow to X marker -->
  <line x1="539" y1="305" x2="539" y2="328" stroke="#ADADAD" stroke-width="1"
        marker-end="url(#arr10c)"/>

  <!-- X blocked marker (boundary condition FAILS) -->
  <rect x="467" y="330" width="144" height="50" fill="#C8102E" fill-opacity="0.07"
        stroke="#C8102E" stroke-width="1.5"/>
  <!-- X symbol -->
  <line x1="489" y1="348" x2="514" y2="373" stroke="#C8102E" stroke-width="3"
        stroke-linecap="round"/>
  <line x1="514" y1="348" x2="489" y2="373" stroke="#C8102E" stroke-width="3"
        stroke-linecap="round"/>
  <text x="535" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#C8102E">f(0) = 0</text>
  <text x="535" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#C8102E">f(L) = 0</text>
  <text x="535" y="378" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="9" fill="#C8102E">cannot both hold</text>
  <text x="539" y="394" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        font-weight="600" fill="#C8102E">EXCLUDED for a box</text>

  <!-- Caption -->
  <text x="350" y="407" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">Choosing k negative forces oscillatory solutions — the only type that can vanish at both walls</text>
  <text x="350" y="420" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
