  <polygon points="206,270 218,248 230,232 242,228 254,232 266,248 278,270"
           fill="#2a1a0e" fill-opacity="0.08"/>
  <!-- Negative lobe fill -->
  <polygon points="134,270 146,292 158,308 170,312 182,308 194,292 206,270"
           fill="#ADADAD" fill-opacity="0.2"/>

  <!-- Arrow to checkmark -->
  <line x1="170" y1="305" x2="170" y2="328" stroke="#ADADAD" stroke-width="1"
        marker-end="url(#arr10c)"/>

  <!-- Checkmark marker (boundary condition SATISFIED) -->
  <rect x="98" y="330" width="144" height="50" fill="#2a1a0e" fill-opacity="0.07"
        stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- Checkmark symbol: V shape -->
  <polyline points="120,358 142,370 178,344" fill="none" stroke="#2a1a0e" stroke-width="3"
            stroke-linejoin="round" stroke-linecap="round"/>
  <text x="200" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">f(0) = 0</text>
  <text x="200" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">f(L) = 0</text>
  <text x="200" y="378" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="9" fill="#2a1a0e">both satisfied</text>
  <text x="170" y="394" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        font-weight="600" fill="#2a1a0e">VALID — quantizes κ</text>

  <!-- ── RIGHT BRANCH: Positive constant → exponential ── -->

  <!-- Sign box -->
  <rect x="430" y="155" width="218" height="36" fill="#C8102E" fill-opacity="0.07"
        stroke="#C8102E" stroke-width="1"/>
  <text x="539" y="170" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        font-weight="600" fill="#C8102E">Positive constant: k = +κ²</text>
  <text x="539" y="184" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10"
        fill="#C8102E">f(x) = Ae^(κx) + Be^(−κx)</text>

  <!-- Down arrow to exponential curve -->
  <line x1="539" y1="192" x2="539" y2="222" stroke="#ADADAD" stroke-width="1"
        marker-end="url(#arr10c)"/>

  <!-- Exponential curve panel -->
  <rect x="420" y="224" width="238" height="80" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- Baseline -->
  <line x1="430" y1="270" x2="648" y2="270" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- Growing exponential: no zero crossings -->
  <polyline fill="none" stroke="#C8102E" stroke-width="2"
    points="430,298 446,294 462,290 478,284 494,276 510,267 526,256 542,242 558,226 574,208 590,192 606,174"/>
  <!-- Decaying branch (negative exponential) -->
  <polyline fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 3"
