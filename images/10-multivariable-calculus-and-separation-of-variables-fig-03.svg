  <!-- Sinusoidal curve panel -->
  <rect x="52" y="224" width="236" height="80" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- Baseline -->
  <line x1="62" y1="270" x2="278" y2="270" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- Sinusoidal curve with ~1.5 full cycles, ZERO crossings at boundaries -->
  <!-- x from 62 to 278 = 216px, 1.5 cycles. Nodes at: 62, 134, 206, 278 -->
  <polyline fill="none" stroke="#2a1a0e" stroke-width="2"
    points="62,270 74,248 86,232 98,228 110,232 122,248 134,270 146,292 158,308 170,312 182,308 194,292 206,270 218,248 230,232 242,228 254,232 266,248 278,270"/>
  <!-- Node count ticks -->
  <line x1="134" y1="264" x2="134" y2="276" stroke="#ADADAD" stroke-width="1"/>
  <line x1="206" y1="264" x2="206" y2="276" stroke="#ADADAD" stroke-width="1"/>
  <!-- Boundary zero labels -->
  <circle cx="62" cy="270" r="3" fill="#2a1a0e"/>
  <circle cx="278" cy="270" r="3" fill="#2a1a0e"/>
  <!-- Positive lobe fill -->
  <polygon points="62,270 74,248 86,232 98,228 110,232 122,248 134,270"
