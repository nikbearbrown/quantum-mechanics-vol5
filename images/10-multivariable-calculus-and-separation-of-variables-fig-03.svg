  <title id="fig-title-10-03">Sign-of-separation-constant decision fork</title>
  <desc>Binary decision fork: diamond decision node at top receiving the separated ODE; left branch for negative separation constant leading to a sinusoidal curve with a checkmark indicating boundary conditions can be satisfied; right branch for positive separation constant leading to an exponential growth-decay curve with an X indicating boundary conditions cannot be satisfied.</desc>
