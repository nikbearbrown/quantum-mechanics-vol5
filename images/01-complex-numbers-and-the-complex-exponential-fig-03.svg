<title id="fig-title-03">Inward spiral: complex exponential with decay</title>
<desc>Trajectory of e raised to (negative gamma plus i omega) times t in the complex plane. Starting on the positive real axis at radius 1, the path winds counterclockwise while the radius shrinks, producing an inward spiral that converges toward the origin as t increases.</desc>
