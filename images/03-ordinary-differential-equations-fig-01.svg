<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0301">
<title id="fig-title-0301">TISE solution families: oscillatory sinusoid versus evanescent exponentials</title>
<desc>Two-panel figure. Left: oscillatory solution A cos(kx) plus B sin(kx) for the classically allowed region (E greater than V), showing 1.5 full cycles crossing zero repeatedly at constant amplitude. Right: two evanescent solutions for the classically forbidden region (E less than V) — a solid decaying exponential (normalizable) falling from its peak, and a dashed growing exponential (non-normalizable) rising without bound.</desc>
