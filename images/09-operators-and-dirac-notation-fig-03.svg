  <!-- Two length bars for ‖ΔA‖² and ‖ΔB‖² -->
  <rect x="60" y="147" width="60" height="12" fill="#C8102E" fill-opacity="0.5" rx="0"/>
  <text x="90" y="158" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9"
        fill="#FFFFFF">⟨(ΔA)²⟩</text>
  <text x="130" y="158" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="12" fill="#D4D4D4">·</text>
  <rect x="138" y="147" width="50" height="12" fill="#787878" fill-opacity="0.5" rx="0"/>
  <text x="163" y="158" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9"
        fill="#FFFFFF">⟨(ΔB)²⟩</text>

  <text x="198" y="158" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="14" fill="#D4D4D4">≥</text>

  <!-- Overlap magnitude -->
  <circle cx="248" cy="153" r="14" fill="#C8860E" fill-opacity="0.4" stroke="#C8860E" stroke-width="0.75"/>
  <text x="248" y="158" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9"
        fill="#2a1a0e">|⟨f|g⟩|²</text>

  <text x="280" y="153" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#545454">= overlap magnitude squared</text>

  <text x="54" y="180" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">σ²_A · σ²_B ≥ |⟨ΔA·ψ | ΔB·ψ⟩|²  — product of variances ≥ squared inner product</text>

  <!-- Step arrow -->
  <line x1="224" y1="186" x2="224" y2="200" stroke="#ADADAD" stroke-width="1.5"
        marker-end="url(#arr09c)"/>
  <text x="238" y="196" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">split ⟨f|g⟩ = Re + i·Im</text>

  <!-- ── Stage 3: Real/Imaginary decomposition ── -->
  <rect x="36" y="202" width="380" height="72" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="54" y="220" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" font-weight="600" fill="#2a1a0e">Stage 3 — Decompose ⟨ΔAψ|ΔBψ⟩</text>

  <!-- Real part box -->
  <rect x="60" y="228" width="120" height="32" fill="#D4D4D4" fill-opacity="0.3"
        stroke="#ADADAD" stroke-width="0.75"/>
  <text x="120" y="243" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">Real part</text>
  <text x="120" y="257" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9"
        fill="#545454">½⟨{A,B}⟩ − ⟨A⟩⟨B⟩</text>

  <!-- + sign -->
  <text x="194" y="248" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="16"
        fill="#ADADAD">+</text>

  <!-- Imaginary part box (containing commutator) -->
  <rect x="204" y="228" width="140" height="32" fill="#C8102E" fill-opacity="0.08"
        stroke="#C8102E" stroke-width="0.75"/>
  <text x="274" y="243" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#C8102E">Imaginary part</text>
  <!-- Commutator bracket icon inside -->
  <text x="274" y="257" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9"
        fill="#C8102E">½i · ⟨[A,B]⟩</text>

  <text x="54" y="270" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">Taking |...|² and dropping Re²: bound comes from imaginary part alone → commutator</text>

  <!-- Step arrow -->
  <line x1="224" y1="274" x2="224" y2="288" stroke="#ADADAD" stroke-width="1.5"
