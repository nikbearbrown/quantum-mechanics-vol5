  <line x1="162" y1="90" x2="162" y2="98" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="150" y1="58" x2="150" y2="98" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>

  <!-- Labels -->
  <text x="168" y="94" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
