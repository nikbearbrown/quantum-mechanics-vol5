  <text x="238" y="284" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">|Im part|² ≤ |full⟨f|g⟩|²</text>

  <!-- ── Stage 4: Robertson bound ── -->
  <rect x="36" y="290" width="380" height="90" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="54" y="308" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" font-weight="600" fill="#C8102E">Stage 4 — Robertson uncertainty bound</text>

  <!-- Two bell curve silhouettes for σ_A and σ_B -->
  <!-- Bell A (small): center (90,345) -->
  <path d="M60,360 Q65,310 90,308 Q115,310 120,360 Z" fill="#C8102E" fill-opacity="0.15"
