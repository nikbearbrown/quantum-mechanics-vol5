  <!-- ── Stage 2: Squared-norm inequality ── -->
  <rect x="36" y="120" width="380" height="66" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="54" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
