  <!-- Formula icon: |⟨f|g⟩|² ≤ ‖f‖²·‖g‖² -->
  <text x="210" y="62" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="12" fill="#2a1a0e">|⟨f|g⟩|²</text>
  <text x="280" y="62" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="14" fill="#D4D4D4">≤</text>
  <text x="298" y="62" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="12" fill="#2a1a0e">‖f‖²‖g‖²</text>
  <text x="210" y="80" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">equality when f ∥ g (zero angle)</text>
  <text x="210" y="95" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
