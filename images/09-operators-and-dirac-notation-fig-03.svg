        fill="#2a1a0e">Robertson uncertainty: Cauchy–Schwarz → commutator bound</text>

  <!-- Stage box geometry: x=36, width=380, heights at y=32,120,200,290,380 -->
  <!-- Annotation column: x=430 -->

  <!-- ── Stage 1: Cauchy–Schwarz geometry ── -->
  <rect x="36" y="32" width="380" height="72" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="54" y="50" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
