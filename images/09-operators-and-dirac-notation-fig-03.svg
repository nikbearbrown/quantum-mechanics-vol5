  <!-- Multiplication dot -->
  <circle cx="275" cy="345" r="3" fill="#2a1a0e"/>

  <!-- Commutator icon: nested bracket pair -->
  <path d="M288,328 L280,328 L280,362 L288,362" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="300" y="350" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13"
        fill="#C8102E">[A,B]</text>
  <path d="M328,328 L336,328 L336,362 L328,362" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="304" y="375" text-anchor="middle"
