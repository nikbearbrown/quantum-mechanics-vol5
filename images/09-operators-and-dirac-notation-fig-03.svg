  <text x="154" y="54" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="10" fill="#787878">g</text>
  <text x="133" y="88" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
