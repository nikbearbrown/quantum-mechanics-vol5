  <!-- Final formula -->
  <text x="350" y="325" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="12" fill="#C8102E">σ_A · σ_B ≥ ½|⟨[A,B]⟩|</text>

  <!-- Annotation column -->
  <rect x="430" y="32" width="234" height="348" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="547" y="52" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        font-weight="600" fill="#2a1a0e">Logical chain</text>

  <text x="442" y="76" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">1. Cauchy–Schwarz</text>
  <text x="442" y="90" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">   inner product magnitude</text>
  <text x="442" y="104" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">   bounded by norms</text>

  <text x="442" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">2. Apply to ΔA·ψ and ΔB·ψ</text>
  <text x="442" y="144" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">   norms = standard deviations</text>
  <text x="442" y="158" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">   σ_A, σ_B</text>

  <text x="442" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">3. Split ⟨ΔAψ|ΔBψ⟩</text>
  <text x="442" y="198" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">   real part = anticommutator</text>
  <text x="442" y="212" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#C8102E">   imag part = commutator</text>

  <text x="442" y="238" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">4. Drop real part (≥ 0)</text>
  <text x="442" y="252" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">   bound is purely from</text>
  <text x="442" y="266" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#C8102E">   the commutator</text>

  <rect x="442" y="280" width="210" height="60" fill="#C8102E" fill-opacity="0.06"
        stroke="#C8102E" stroke-width="0.75"/>
  <text x="547" y="298" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11"
        fill="#C8102E">σ_A σ_B ≥ ½|⟨[A,B]⟩|</text>
  <text x="547" y="314" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">Non-zero commutator</text>
  <text x="547" y="328" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10"
        fill="#545454">⟹ irreducible uncertainty</text>

  <!-- Caption -->
  <text x="350" y="398" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">The bound is tight: Cauchy–Schwarz forces σ_A σ_B ≥ ½|⟨[A,B]⟩|</text>
  <text x="350" y="413" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11"
        fill="#545454">Observables with [A,B] ≠ 0 cannot simultaneously have zero spread</text>
