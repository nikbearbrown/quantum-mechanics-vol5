  <!-- Two vectors from origin at (100,88): f (blue) at 0°, g (green) at 40° -->
  <line x1="100" y1="90" x2="162" y2="90" stroke="#C8102E" stroke-width="2"
        marker-end="url(#arr09c-ink)"/>
  <line x1="100" y1="90" x2="150" y2="58" stroke="#787878" stroke-width="2"
