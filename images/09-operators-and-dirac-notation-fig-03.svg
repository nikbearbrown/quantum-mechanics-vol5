  <!-- Bell B (smaller): center (160,345) -->
  <path d="M134,360 Q138,325 160,323 Q182,325 186,360 Z" fill="#787878" fill-opacity="0.15"
        stroke="#787878" stroke-width="1"/>
  <text x="160" y="375" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10"
        fill="#545454">σ_B</text>

  <!-- ≥ symbol -->
  <text x="205" y="350" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="20"
        fill="#D4D4D4">≥</text>

  <!-- ½ disk -->
  <path d="M228,345 A16,16 0 0,1 260,345 Z" fill="#ADADAD" fill-opacity="0.5"
