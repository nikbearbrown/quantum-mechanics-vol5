  <text x="128.3" y="97" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8860E">r&#x2091;</text>
  <text x="128.3" y="85" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">2.8e-5 A</text>

  <!-- Bracket 1: lC to a0, ratio ~137 -->
  <path d="M 359.4,240 L 359.4,258 L 590.1,258 L 590.1,240"
