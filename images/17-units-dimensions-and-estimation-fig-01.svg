<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title-c17-01">
  <title id="fig-title-c17-01">Hierarchy of atomic length scales: Bohr radius, Compton wavelength, and classical electron radius</title>
  <desc>Horizontal logarithmic ruler spanning five decades from 10^-5 to 1 Angstrom with three downward arrow markers for the Bohr radius a0 (ink), Compton wavelength lambda_C (gray), and classical electron radius r_e (ochre). Two equal-width dashed brackets below the ruler show that adjacent scales are separated by a factor of approximately 137 (the inverse fine-structure constant).</desc>
