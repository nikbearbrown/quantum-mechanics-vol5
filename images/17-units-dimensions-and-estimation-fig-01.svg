  <line x1="80" y1="200" x2="620" y2="200" stroke="#2a1a0e" stroke-width="1.5"/>

  <line x1="80.0" y1="192" x2="80.0" y2="208" stroke="#2a1a0e" stroke-width="1"/>
<text x="80.0" y="222" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">10^-5</text>
<line x1="188.0" y1="192" x2="188.0" y2="208" stroke="#2a1a0e" stroke-width="1"/>
<text x="188.0" y="222" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">10^-4</text>
<line x1="296.0" y1="192" x2="296.0" y2="208" stroke="#2a1a0e" stroke-width="1"/>
<text x="296.0" y="222" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">10^-3</text>
<line x1="404.0" y1="192" x2="404.0" y2="208" stroke="#2a1a0e" stroke-width="1"/>
<text x="404.0" y="222" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">10^-2</text>
<line x1="512.0" y1="192" x2="512.0" y2="208" stroke="#2a1a0e" stroke-width="1"/>
<text x="512.0" y="222" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">10^-1</text>
<line x1="620.0" y1="192" x2="620.0" y2="208" stroke="#2a1a0e" stroke-width="1"/>
<text x="620.0" y="222" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">10^0</text>


  <!-- Arrow a0 (ink, tall) -->
  <line x1="590.1" y1="68" x2="590.1" y2="195" stroke="#2a1a0e" stroke-width="2" marker-end="url(#arw17a)"/>
  <circle cx="590.1" cy="200" r="4" fill="#2a1a0e"/>
  <text x="590.1" y="60" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">a&#x2080;</text>
  <text x="590.1" y="48" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">0.529 A</text>

  <!-- Arrow lambda_C (gray, medium) -->
