  <rect x="366" y="72" width="298" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Eigenvector 1: direction ~30°, eigenvalue λ₁ > 1 (stretch) -->
