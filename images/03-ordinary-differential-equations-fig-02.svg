<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0302">
<title id="fig-title-0302">Infinite square well: quantized standing waves n=1,2,3 and a rejected non-quantized solution</title>
<desc>Infinite square well with thick walls at x=0 and x=L. Three accepted eigenfunctions are shown offset at energy baselines proportional to n-squared: n=1 has one half-arch, n=2 has two, n=3 has three, each vanishing at both walls. One dashed rejected curve fails to reach zero at the right wall, illustrating that only discrete energies satisfy the boundary conditions.</desc>
