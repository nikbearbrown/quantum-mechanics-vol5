<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0402">
<title id="fig-title-0402">Every smooth potential minimum is locally harmonic: anharmonic well and parabolic approximation</title>
<desc>An asymmetric anharmonic potential well (steeper left flank, shallower right) shown alongside its parabolic harmonic approximation. Both curves share the same minimum point and the same curvature there. A shaded band marks the region near the minimum where the two curves closely agree. Beyond this region the curves visibly diverge, showing where anharmonic corrections become important.</desc>
