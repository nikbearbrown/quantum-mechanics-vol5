<title id="fig-title-0403">Perturbation theory: well-separated levels vs. near-degenerate levels</title>
<desc>Two-panel diagram. Left: two energy levels well separated; a perturbation produces small first-order shifts. Right: two nearly degenerate levels with the same perturbation producing dramatically large level repulsion, with curved mixing brackets connecting original to strongly shifted positions. Visual contrast illustrates why perturbation theory breaks down near degeneracy.</desc>
