<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0601">
<title id="fig-title-0601">Fourier series to Fourier transform: discrete comb densifies to continuous spectrum as L grows</title>
<desc>Three stacked panels sharing a horizontal k-axis. Top: sparse discrete comb (period L, ~8 spikes). Middle: denser comb (period 2L, ~16 spikes). Bottom: smooth Gaussian envelope (the transform limit) with ghost comb marks. Right-margin arrow indicates the progression as L increases.</desc>
