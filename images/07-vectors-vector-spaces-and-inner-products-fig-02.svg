  <!-- ══ PANEL 1 ══ x=36–226, y=72–348 -->
  <rect x="36" y="72" width="190" height="276" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Origin at (131, 290) -->
  <!-- v1: angle ~10° from horizontal, length ~130px → tip at ~(131+128, 290-23) = (259... clipped, use 131+115,290-20)=(246,270)?
       Use within panel. Origin at (115, 280).
       v1 at angle 15°: tip at 115+100*cos15=115+96.6=212, 280-100*sin15=280-26=254 → (212,254)
       v2 at angle 40°: tip at 115+85*cos40=115+65=180, 280-85*sin40=280-55=225 → (180,225) -->
  <!-- Origin panel 1: (115, 282) -->
  <line x1="115" y1="282" x2="209" y2="256" stroke="#C8102E" stroke-width="2.5"
        marker-end="url(#arr02-red)"/>
  <line x1="115" y1="282" x2="175" y2="222" stroke="#ADADAD" stroke-width="2"
