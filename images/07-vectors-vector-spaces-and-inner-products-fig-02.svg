  <!-- ══ PANEL 2 ══ x=252–442, y=72–348 -->
  <rect x="252" y="72" width="190" height="276" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Origin panel 2: (347, 282) -->
  <!-- e1 normalized (unit): along 15°, length 90px → tip at (347+87, 282-23)=(434,259) — trim to panel -->
  <!-- Use origin at (315,282), unit length ~80px, e1 along ~5° so near horizontal -->
  <!-- e1: (315,282) → (395,277) -->
  <line x1="315" y1="282" x2="393" y2="278" stroke="#C8102E" stroke-width="2.5"
        marker-end="url(#arr02-red)"/>
  <!-- Unit circle arc centered at (315,282), r=78 from angle -5° to 40° -->
  <path d="M393,278 A78,78 0 0,1 375,232" fill="none" stroke="#D4D4D4" stroke-width="0.75"
        stroke-dasharray="4 3"/>

  <!-- v2 (unchanged direction from step 1) at ~40° from origin, length ~90px -->
  <!-- tip at 315+90*cos40=315+69=384, 282-90*sin40=282-58=224 → (384,224) -->
  <line x1="315" y1="282" x2="381" y2="224" stroke="#ADADAD" stroke-width="2"
        marker-end="url(#arr02-gray)"/>

  <!-- Projection of v2 onto e1: foot is at projection along e1 direction.
       e1 direction ~(0.996,-0.064). v2=(69,-58). proj length=69*0.996+(-58)*(-0.064)=68.7+3.7=72.4
       Foot at (315+72.4*0.996, 282+72.4*(-0.064)) ≈ (387,277) — near tip of e1, makes sense.
       Actually foot = (315+69,282) = (384,282) for simplicity with near-horizontal e1. -->
  <!-- Foot point: (384, 279) -->
  <line x1="381" y1="224" x2="381" y2="278" stroke="#D4D4D4" stroke-width="0.75"
        stroke-dasharray="4 3"/>
  <!-- Right-angle mark at foot (381,278) -->
  <path d="M381,271 L374,271 L374,278" fill="none" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Residual vector (perpendicular to e1, from foot to tip of v2):
       from (381,278) to (381,224) is the residual — already drawn as projection line.
       The residual arrow itself: foot (381,278) → v2 tip direction offset.
       Residual = v2 - projection = v2 tip - foot.
       Actual residual: from foot (381,278) to (381,224) but colored distinctly. -->
  <!-- Residual arrow in accent red -->
  <line x1="381" y1="278" x2="381" y2="230" stroke="#C8102E" stroke-width="2"
        marker-end="url(#arr02-red)" stroke-dasharray="none"/>

