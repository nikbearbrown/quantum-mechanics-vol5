  <text x="384" y="220" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="11" fill="#545454">v₂</text>
  <text x="388" y="258" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="11" fill="#C8102E">r</text>

  <text x="348" y="378" text-anchor="middle"
