<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title-c16-03">
  <title id="fig-title-c16-03">Partial trace: Bell state density matrix traced over subsystem B gives maximally mixed state</title>
  <desc>Three-stage horizontal flow showing the partial trace operation: Stage 1 is the 4×4 joint density matrix ρ_AB for the Bell state |Φ+⟩ with four nonzero entries highlighted in blue; a curved arrow indicates tracing out subsystem B to yield Stage 2, the 2×2 reduced state ρ_A = I/2 with equal diagonal entries in green; Stage 3 shows a generic diagonal mixed state in red for contrast, separated by a dashed line.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Quantum Mechanics" book-slug="quantum-mechanics-vol5"
      chapter="16-tensor-products-and-composite-systems" figure-number="03"
      figure-title="Partial trace: from pure Bell state to mixed reduced state"
      figure-slug="partial-trace-bell-state" figure-type="diagram"
