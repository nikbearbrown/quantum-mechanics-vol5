<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-0603">
<title id="fig-title-0603">Wave packet spreading in time: three snapshots showing broadening and center motion</title>
<desc>Three panels showing a Gaussian wave packet at successive times t1, t2, t3 from left to right. Each successive panel shows the packet wider and shorter while preserving the same area under the curve. The center position of each Gaussian moves to the right at a constant group velocity, shown by three dots connected by a dashed guide line. Width brackets at each time confirm the broadening. All y-axes start at zero.</desc>
