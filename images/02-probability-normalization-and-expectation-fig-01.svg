<title id="fig-title-0201">Gaussian probability density: area as probability, sigma bracket, and shaded interval</title>
<desc>Gaussian probability density function symmetric about its mean at zero. The y-axis starts at zero, showing probability density values not probabilities. A bracket below the x-axis marks the interval from negative sigma to positive sigma. A shaded strip to the right of the mean shows a finite-interval probability as the area under the curve.</desc>
