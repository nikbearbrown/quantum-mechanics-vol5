  <title id="fig-title-11-01">Sturm–Liouville taxonomy — seven special-function families from one structure</title>
  <desc>Two-level hierarchy: a single anchor box at the top representing the Sturm–Liouville self-adjoint operator; seven leaf boxes in a horizontal row below, each with a distinguishing shape icon for one special-function family and a color-coded badge for the quantization mechanism. Three badge colors: bluish-green for series termination, gray for regularity at endpoint, red-accent for asymptotic boundary zeros.</desc>
