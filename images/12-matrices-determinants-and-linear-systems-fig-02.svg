  <title id="fig-title-12-02">Bloch sphere cross-section — pure states on surface, mixed states interior</title>
  <desc>Flat circle representing the Bloch sphere cross-section: boundary circle (pure states, |r|=1) with three marked boundary points at north pole, south pole, and equator; one interior point (mixed state, |r|&lt;1) with Bloch vector arrow from center; center point (maximally mixed state); dashed vertical spin axis from south to north pole through center.</desc>
