  <text x="78" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">Maximally mixed: ρ = I/2</text>
  <text x="78" y="235" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
