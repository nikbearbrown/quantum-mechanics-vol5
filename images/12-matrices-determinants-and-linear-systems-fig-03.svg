  <text x="554" y="178" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="10" fill="#545454">{σᵢ,σⱼ} = 2δᵢⱼI</text>
  <text x="554" y="194" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
