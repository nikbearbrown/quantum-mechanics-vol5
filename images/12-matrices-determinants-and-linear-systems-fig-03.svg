  <title id="fig-title-12-03">Pauli matrix commutation cycle</title>
  <desc>Equilateral triangle layout with three circular nodes representing the three Pauli operators differentiated by color only: orange for σₓ (lower-left), green for σᵧ (lower-right), red for σᵤ (top). Three clockwise curved arrows in dark red connect σₓ→σᵧ→σᵤ→σₓ, representing the cyclic commutation relation [σᵢ,σⱼ] = 2iεᵢⱼₖσₖ.</desc>
